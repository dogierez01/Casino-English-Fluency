<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>casino english</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="logo-screen" class="screen">
        <img src="logo.png" alt="logo" class="main-logo">
        <button id="to-instructions-btn" class="gold-btn">continue</button>
    </div>

    <div id="instructions-screen" class="screen hidden">
        <img src="instructions.png" alt="instructions" class="instructions-img">
        <button id="to-lobby-btn" class="gold-btn">go to lobby</button>
    </div>

    <div id="lobby-screen" class="screen hidden">
        <h1 class="gold-text">select a casino</h1>
        <div id="casino-grid" class="grid-container"></div>
    </div>

    <div id="game-screen" class="screen hidden">
        <div class="casino-container">
            <div style="display: flex; justify-content: space-between; width: 100%;">
                <button id="back-to-lobby" class="back-btn">← lobby</button>
                <button id="reset-btn" class="back-btn hidden">↺ reset game</button>
            </div>
            
            <h2 id="anchor-text">loading...</h2> 
            
            <div class="score-board">jackpot: <span id="score">0</span> pts | words left: <span id="words-left">?</span></div>
            
            <main class="slot-machine">
                <div class="variable-reel"><div id="variable-text">???</div></div>
                <div class="controls">
                    <button id="spin-btn" class="spin-btn">spin</button>
                    <button id="mic-btn" class="mic-btn hidden">🎤 tap to speak</button>
                </div>
            </main>
            
            <div id="feedback-area" class="hidden">
                <h3 id="status-badge" style="color: #ccc; font-size: 1.2rem;">student said:</h3>
                <p id="turkish-mirror" style="font-size: 1.5rem; font-weight: bold; color: white; margin-bottom: 20px;"></p>
                
                <div id="attempt-1-controls" class="teacher-controls hidden">
                    <button id="btn-perfect" class="teacher-btn btn-green">🟢 perfect (+50)</button>
                    <button id="btn-try-again" class="teacher-btn btn-orange">🟠 try again</button>
                </div>

                <div id="attempt-2-controls" class="teacher-controls hidden">
                    <button id="btn-pass" class="teacher-btn btn-yellow">🟡 pass (+30)</button>
                    <button id="btn-fail" class="teacher-btn btn-red">🔴 fail (0 pts)</button>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
