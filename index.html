<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>casino english</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="logo-screen" class="screen">
        <img src="logo.png" alt="logo" class="main-logo">
        <button id="to-instructions-btn" class="btn gold-btn">continue</button>
    </div>

    <div id="instructions-screen" class="screen hidden">
        <img src="instructions.png" alt="instructions" class="instructions-img">
        <button id="to-lobby-btn" class="btn gold-btn">go to lobby</button>
    </div>

    <div id="lobby-screen" class="screen hidden">
        <h1 class="gold-text">select a casino</h1>
        <div id="casino-grid" class="grid-container"></div>
    </div>

    <div id="game-screen" class="screen hidden">
        <div class="casino-container">
            <button id="back-to-lobby" class="back-btn">← lobby</button>
            <h2 id="anchor-text">loading...</h2> 
            <div class="score-board">jackpot: <span id="score">0</span> pts</div>
            
            <main class="slot-machine">
                <div class="variable-reel"><div id="variable-text">???</div></div>
                <div class="controls">
                    <button id="spin-btn" class="btn spin-btn">spin</button>
                    <button id="mic-btn" class="btn mic-btn hidden">🎤 tap to speak</button>
                </div>
            </main>

            <div id="feedback-area" class="hidden">
                <h3 id="status-badge"></h3>
                <p id="turkish-mirror"></p>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
